<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>啼鸣转文稿工作台</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260501c" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Timming Workspace</p>
          <h1>啼鸣转文稿工作台</h1>
          <p class="hero-text">
            先把 B 站视频变成可读、可查、可继续加工的知识文件。当前版本使用 Demo
            Pipeline，重点验证工作台结构。
          </p>
        </div>
        <div class="hero-metrics">
          <div class="metric-card">
            <span class="metric-label">当前模式</span>
            <strong id="metric-mode">Demo</strong>
          </div>
          <div class="metric-card">
            <span class="metric-label">文件总数</span>
            <strong id="metric-count">0</strong>
          </div>
          <div class="metric-card">
            <span class="metric-label">最后刷新</span>
            <strong id="metric-refresh">--:--</strong>
          </div>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-input">
          <div class="panel-head">
            <div>
              <p class="section-kicker">01 / 导入</p>
              <h2>提交 B 站链接</h2>
            </div>
            <span class="pill">最小闭环</span>
          </div>

          <form id="source-form" class="source-form">
            <label class="field">
              <span>视频链接</span>
              <input
                id="source-url"
                name="url"
                type="url"
                placeholder="https://www.bilibili.com/video/BV..."
                required
              />
            </label>

            <div class="form-options">
              <label class="check">
                <input id="generate-polish" type="checkbox" checked />
                <span>生成 AI 润色版</span>
              </label>
              <label class="check">
                <input id="generate-summary" type="checkbox" checked />
                <span>生成摘要与大纲</span>
              </label>
            </div>

            <div class="form-actions">
              <button id="check-button" type="button" class="button button-secondary">先校验</button>
              <button id="process-button" type="submit" class="button button-primary">开始转文稿</button>
            </div>
          </form>

          <div id="flash" class="flash" hidden></div>
          <div id="check-result" class="check-result" hidden></div>
        </section>

        <section class="workspace-grid">
          <aside class="panel panel-list">
            <div class="panel-head">
              <div>
                <p class="section-kicker">02 / 文件</p>
                <h2>知识文件列表</h2>
              </div>
              <button id="refresh-button" type="button" class="text-button">刷新</button>
            </div>

            <div id="video-list" class="video-list empty-state">
              还没有文件，先提交一个 B 站链接。
            </div>
          </aside>

          <section class="panel panel-detail">
            <div class="panel-head">
              <div>
                <p class="section-kicker">03 / 结果</p>
                <h2>知识文件详情</h2>
              </div>
              <button id="retry-button" type="button" class="button button-ghost" disabled>重新处理</button>
            </div>

            <div id="detail-empty" class="detail-empty">
              选择左侧文件后，这里会展示原文、润色稿、时间戳、摘要和大纲。
            </div>

            <article id="detail-view" class="detail-view" hidden>
              <div class="detail-top">
                <div>
                  <h3 id="detail-title">--</h3>
                  <p id="detail-meta" class="detail-meta"></p>
                  <div id="detail-tags" class="detail-tags"></div>
                </div>
                <div class="detail-status-wrap">
                  <span id="detail-status" class="status-badge">--</span>
                </div>
              </div>

              <nav class="group-row" id="group-tabs">
                <button class="group-button is-active" data-group="transcript">视频文案</button>
                <button class="group-button" data-group="study">学习稿</button>
                <button class="group-button" data-group="ops">处理记录</button>
              </nav>

              <nav class="tab-row" id="detail-tabs">
                <button class="tab-button is-active" data-tab="polished">AI润色版</button>
                <button class="tab-button" data-tab="original">原文</button>
                <button class="tab-button" data-tab="timestamp">时间戳</button>
              </nav>

              <section class="detail-card">
                <div id="detail-content" class="detail-content markdown-body"></div>
              </section>
            </article>
          </section>
        </section>
      </main>
    </div>

    <script src="/static/app.js?v=20260501c" defer></script>
  </body>
</html>
